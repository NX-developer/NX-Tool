name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager "ndk;25.2.9519653" "cmake;3.22.1" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build APKs
        run: |
          set -o pipefail
          if ! gradle assembleDebug assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log; then
            echo "BUILD_FAILED=1" >> $GITHUB_ENV
            grep -nE "error:|CMake Error|ninja: error|FAILED|^e: |> Task .* FAILED|Caused by:" build.log | tail -30 | while IFS= read -r line; do
              clean=$(printf '%s' "$line" | tr -d '\r' | cut -c1-350)
              echo "::error::${clean}"
            done
            exit 1
          fi

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p out
          unzip -o app/build/outputs/apk/debug/app-debug.apk 'lib/arm64-v8a/*.so' -d out
          cp app/build/outputs/apk/debug/app-debug.apk out/
          cp app/build/outputs/apk/release/app-release-unsigned.apk out/
          ls -lhR out

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nxtool-artifacts
          path: out/**
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
