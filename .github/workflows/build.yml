name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APKs
        run: gradle assembleDebug assembleRelease --no-daemon 2>&1 | tee build.log

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p out
          unzip -o app/build/outputs/apk/debug/app-debug.apk 'lib/arm64-v8a/libnxtool.so' -d out || true
          cp app/build/outputs/apk/debug/app-debug.apk out/ 2>/dev/null || true
          cp app/build/outputs/apk/release/app-release-unsigned.apk out/ 2>/dev/null || true
          ls -lhR out || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nxtool-artifacts
          path: out/**

      - name: Error log
        if: failure()
        run: |
          mkdir -p out
          cp build.log out/error.txt 2>/dev/null || echo "no build.log produced" > out/error.txt

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error
          path: out/error.txt
