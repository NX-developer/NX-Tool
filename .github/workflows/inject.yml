name: inject

on:
  workflow_dispatch:
    inputs:
      mc_apk_url:
        description: 'Direct download URL of the Minecraft universal (merged) or arm64 APK'
        required: true
        type: string

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK, CMake, build-tools
        run: sdkmanager "ndk;25.2.9519653" "cmake;3.22.1" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build NX Tool libs
        run: gradle assembleDebug --no-daemon

      - name: Extract libs
        run: |
          mkdir -p libs
          unzip -o app/build/outputs/apk/debug/app-debug.apk 'lib/arm64-v8a/*.so' -d tmp
          cp tmp/lib/arm64-v8a/libnxtool.so libs/
          cp tmp/lib/arm64-v8a/libshadowhook.so libs/
          ls -lh libs

      - name: Download Minecraft APK
        run: |
          curl -L --fail -o minecraft.apk "${{ github.event.inputs.mc_apk_url }}"
          ls -lh minecraft.apk
          file minecraft.apk

      - name: Install patcher deps
        run: pip install "lief>=0.15.0"

      - name: Generate signing key
        run: |
          keytool -genkeypair -v -keystore nx.keystore -alias nxkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nxtoolpass -keypass nxtoolpass \
            -dname "CN=NX Team, O=NX, C=TR"

      - name: Inject
        run: |
          export PATH="$ANDROID_HOME/build-tools/34.0.0:$PATH"
          python patcher/inject.py minecraft.apk --libs-dir ./libs \
            -o minecraft-nxtool.apk \
            --keystore nx.keystore --ks-pass nxtoolpass --ks-alias nxkey
          ls -lh minecraft-nxtool.apk

      - name: Upload patched APK
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-nxtool
          path: minecraft-nxtool.apk
          if-no-files-found: error
